<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKS Bank - Sign In</title>
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f6f8; color: #333; text-align: center; padding: 20px; }
        
        /* Container & Typography */
        .container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; width: 100%; }
        h1, h2 { color: #1a1a1a; margin-bottom: 25px; }
        h1 { font-size: 1.8rem; }
        
        /* Form Inputs */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #0052cc; }
        
        /* Buttons & Links */
        .primary-btn, .secondary-btn { width: 100%; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .primary-btn { background-color: #0052cc; color: white; border: none; }
        .primary-btn:hover { background-color: #003d99; }
        .secondary-btn { background-color: transparent; color: #0052cc; border: 1px solid #0052cc; margin-top: 15px; }
        .secondary-btn:hover { background-color: #f0f7ff; }
        .back-link { display: inline-block; margin-top: 25px; color: #64748b; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-link:hover { color: #0052cc; }
        
        /* Modal & Status Alerts */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background-color: #ffffff; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #94a3b8; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #ef4444; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- Login Container -->
    <div id="login-view" class="container">
        <img src="source/hks-bank.jpg" alt="HKS Bank Logo" style="max-width: 150px; margin-bottom: 20px;">
        <div class="input-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter your username">
        </div>
        <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
        </div>
        <p id="login-error" class="error-msg">Invalid username or password.</p>
        <button onclick="attemptLogin()" class="primary-btn">Sign In</button>
        <button onclick="openRegisterModal()" class="secondary-btn">Register New Account</button>
        <a href="/" class="back-link">&larr; Back to Portal</a>
    </div>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRegisterModal()">&times;</span>
            <h2>Register</h2>
            <div class="input-group">
                <label for="reg-username">Choose a Username</label>
                <input type="text" id="reg-username" placeholder="New username">
            </div>
            <div class="input-group">
                <label for="reg-password">Choose a Password</label>
                <input type="password" id="reg-password" placeholder="New password">
            </div>
            <p id="reg-error" class="error-msg">Please fill out both fields.</p>
            <button onclick="registerAccount()" class="primary-btn">Create Account</button>
        </div>
    </div>

    <script>
        const registerModal = document.getElementById('registerModal');
        const loginError = document.getElementById('login-error');
        const regError = document.getElementById('reg-error');

        function openRegisterModal() {
            registerModal.style.display = 'flex';
            regError.style.display = 'none';
        }

        function closeRegisterModal() { 
            registerModal.style.display = 'none'; 
        }

        window.onclick = (e) => { 
            if (e.target === registerModal) closeRegisterModal(); 
        }

        async function registerAccount() {
            const user = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-password').value.trim();
            
            if (!user || !pass) {
                regError.innerText = "Please fill out both fields.";
                regError.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert("Account created successfully!");
                    closeRegisterModal();
                    document.getElementById('login-username').value = user;
                    document.getElementById('login-password').value = '';
                } else {
                    regError.innerText = data.message;
                    regError.style.display = 'block';
                }
            } catch (err) {
                regError.innerText = "Server error occurred.";
                regError.style.display = 'block';
            }
        }

        async function attemptLogin() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/hks-bank-dashboard.html';
                } else {
                    loginError.innerText = data.message;
                    loginError.style.display = 'block';
                }
            } catch (err) {
                loginError.innerText = "Server error occurred.";
                loginError.style.display = 'block';
            }
        }

        window.addEventListener('load', async () => {
            const response = await fetch('/api/current-user');
            const data = await response.json();
            if (data.loggedIn) {
                window.location.href = '/hks-bank-dashboard.html';
            }
        });
    </script>
</body>
</html>
