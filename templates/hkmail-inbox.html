<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKMail — Inbox</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:    #0B1A33;
            --navy-lt: #132440;
            --red:     #D72638;
            --red-dk:  #B01E2D;
            --white:   #FFFFFF;
            --slate:   #E8EDF5;
            --muted:   #6B7A99;
            --border:  #D0D8E8;
            --bg:      #F4F7FB;
            --unread:  #EBF0FA;
            --sidebar-w: 220px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--navy);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            background: var(--navy);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            flex-shrink: 0;
            z-index: 50;
        }

        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-mark {
            width: 34px; height: 34px;
            background: var(--red);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .logo-mark svg { width: 18px; height: 18px; }

        .logo-text {
            font-size: 1.15rem; font-weight: 800;
            color: var(--white); letter-spacing: -0.5px;
        }

        .logo-text span { color: var(--red); }

        .topbar-user {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-email {
            color: rgba(255,255,255,0.55);
            font-size: 0.82rem;
            font-weight: 500;
        }

        .btn-compose {
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 7px;
            padding: 8px 18px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-compose:hover { background: var(--red-dk); }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-logout:hover {
            border-color: rgba(255,255,255,0.5);
            color: var(--white);
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-nav {
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.15s;
            user-select: none;
            position: relative;
        }

        .nav-item:hover { background: var(--slate); color: var(--navy); }

        .nav-item.active {
            background: #FEE8EB;
            color: var(--red);
        }

        .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

        .badge {
            margin-left: auto;
            background: var(--red);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
            display: none;
        }

        .badge.visible { display: block; }

        /* ── Email list pane ── */
        .list-pane {
            width: 340px;
            flex-shrink: 0;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-header {
            padding: 16px 18px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .list-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
        }

        .list-count {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .email-list {
            flex: 1;
            overflow-y: auto;
        }

        .email-item {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }

        .email-item:hover { background: var(--slate); }
        .email-item.active { background: #FEE8EB; }
        .email-item.unread { background: var(--unread); }
        .email-item.unread:hover { background: #dce6f7; }

        .email-from {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--navy);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .email-item.unread .email-from { color: var(--red); }

        .email-subject {
            font-size: 0.82rem;
            color: #334;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .email-date {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .unread-dot {
            display: none;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
        }

        .email-item.unread .unread-dot { display: block; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            text-align: center;
            padding: 40px 20px;
            gap: 10px;
        }

        .empty-state svg { width: 40px; height: 40px; opacity: 0.3; }
        .empty-state p { font-size: 0.88rem; }

        /* ── Reading pane ── */
        .read-pane {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .read-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            gap: 12px;
            opacity: 0.5;
        }

        .read-placeholder svg { width: 52px; height: 52px; }
        .read-placeholder p { font-size: 0.9rem; font-weight: 500; }

        .email-view {
            padding: 28px 32px;
            display: none;
            flex-direction: column;
            gap: 0;
        }

        .email-view.visible { display: flex; }

        .email-view-header {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 16px;
        }

        .email-view-subject {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 14px;
        }

        .email-view-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .email-view-meta span strong {
            color: var(--navy);
            font-weight: 600;
        }

        .email-view-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            background: var(--slate);
            border: 1px solid var(--border);
            color: var(--navy);
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn:hover { background: var(--border); }
        .action-btn.danger { color: var(--red); }
        .action-btn.danger:hover { background: #FEE8EB; border-color: #FCC8CC; }
        .action-btn.success { color: #1A7A3C; }
        .action-btn.success:hover { background: #E8F5EC; border-color: #B8E0C4; }

        .email-view-body {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 28px;
            font-size: 0.92rem;
            line-height: 1.7;
            color: #222;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── Compose modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.open { display: flex; }

        .compose-card {
            background: var(--white);
            border-radius: 14px;
            width: 100%;
            max-width: 560px;
            padding: 28px 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .compose-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 20px;
        }

        .compose-close {
            position: absolute;
            top: 18px; right: 22px;
            font-size: 1.3rem;
            color: var(--muted);
            cursor: pointer;
            line-height: 1;
            transition: color 0.15s;
        }

        .compose-close:hover { color: var(--red); }

        .c-field { margin-bottom: 14px; }

        .c-label {
            display: block;
            font-size: 0.77rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .c-input {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 0.92rem;
            color: var(--navy);
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        .c-input:focus { border-color: var(--red); }

        .c-textarea {
            resize: vertical;
            min-height: 140px;
        }

        .compose-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-send {
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 7px;
            padding: 10px 24px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-send:hover { background: var(--red-dk); }
        .btn-send:disabled { opacity: 0.6; cursor: not-allowed; }

        .compose-msg {
            font-size: 0.82rem;
            padding: 6px 10px;
            border-radius: 6px;
            display: none;
        }

        .compose-msg.error {
            background: #FEE8EB;
            color: var(--red);
            border: 1px solid #FCC8CC;
            display: block;
        }

        .compose-msg.success {
            background: #E8F5EC;
            color: #1A7A3C;
            border: 1px solid #B8E0C4;
            display: block;
        }

        /* ── Spinner ── */
        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--navy);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 300;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        /* ── Scrollbar styling ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
    <a href="/" class="topbar-logo">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="5" width="20" height="14" rx="2" stroke="white" stroke-width="1.8" fill="none"/>
                <polyline points="2,6 12,13 22,6" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>
        <div class="logo-text">HK<span>Mail</span></div>
    </a>

    <div class="topbar-user">
        <span class="topbar-email" id="topbar-email">—</span>
        <button class="btn-compose" onclick="openCompose()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/>
                <path d="M17.5 2.5a2.121 2.121 0 0 1 3 3L12 14l-4 1 1-4 7.5-7.5z"/>
            </svg>
            Compose
        </button>
        <button class="btn-logout" onclick="doLogout()">Sign out</button>
    </div>
</div>

<!-- ── Main layout ── -->
<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <nav class="sidebar-nav">
            <div class="nav-item active" id="nav-inbox" onclick="loadFolder('inbox')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                    <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
                </svg>
                Inbox
                <span class="badge" id="unread-badge">0</span>
            </div>
            <div class="nav-item" id="nav-sent" onclick="loadFolder('sent')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Sent
            </div>
            <div class="nav-item" id="nav-trash" onclick="loadFolder('trash')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                Trash
            </div>
        </nav>
    </div>

    <!-- Email list pane -->
    <div class="list-pane">
        <div class="list-header">
            <h2 id="folder-title">Inbox</h2>
            <span class="list-count" id="list-count"></span>
        </div>
        <div class="email-list" id="email-list">
            <div class="empty-state" id="list-loading">
                <p>Loading…</p>
            </div>
        </div>
    </div>

    <!-- Reading pane -->
    <div class="read-pane" id="read-pane">
        <div class="read-placeholder" id="read-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <polyline points="2,6 12,13 22,6"/>
            </svg>
            <p>Select a message to read it</p>
        </div>
        <div class="email-view" id="email-view">
            <div class="email-view-header" id="email-view-header"></div>
            <div class="email-view-body" id="email-view-body"></div>
        </div>
    </div>

</div>

<!-- ── Compose modal ── -->
<div class="modal-overlay" id="compose-modal">
    <div class="compose-card">
        <span class="compose-close" onclick="closeCompose()">&times;</span>
        <h3>New Message</h3>

        <div id="compose-msg" class="compose-msg"></div>

        <div class="c-field">
            <label class="c-label" for="c-to">To</label>
            <input class="c-input" type="text" id="c-to"
                   placeholder="username or username@hkmail.cn" autocomplete="off">
        </div>
        <div class="c-field">
            <label class="c-label" for="c-subject">Subject</label>
            <input class="c-input" type="text" id="c-subject" placeholder="(No subject)">
        </div>
        <div class="c-field">
            <label class="c-label" for="c-body">Message</label>
            <textarea class="c-input c-textarea" id="c-body" placeholder="Write your message…"></textarea>
        </div>
        <div class="compose-footer">
            <button class="btn-send" id="send-btn" onclick="doSend()">Send</button>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
    // ── State ──────────────────────────────────────────────────────────────────
    let currentFolder = 'inbox';
    let currentEmailId = null;
    let emailCache = [];

    // ── Init ───────────────────────────────────────────────────────────────────
    (async function init() {
        const res  = await fetch('/api/hkmail/current-user');
        const data = await res.json();
        if (!data.loggedIn) {
            window.location.href = '/hkmail.html';
            return;
        }
        document.getElementById('topbar-email').textContent = data.username;
        await loadFolder('inbox');
        refreshUnread();
    })();

    // ── Folder loading ─────────────────────────────────────────────────────────
    async function loadFolder(folder) {
        currentFolder = folder;
        currentEmailId = null;
        hideEmailView();

        // Update nav
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + folder).classList.add('active');

        const titles = { inbox: 'Inbox', sent: 'Sent', trash: 'Trash' };
        document.getElementById('folder-title').textContent = titles[folder] || folder;

        const listEl = document.getElementById('email-list');
        listEl.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';

        try {
            const res  = await fetch('/api/hkmail/' + folder);
            const data = await res.json();
            if (!data.success) { listEl.innerHTML = '<div class="empty-state"><p>Failed to load.</p></div>'; return; }

            emailCache = data.emails || [];
            renderList(emailCache);
        } catch {
            listEl.innerHTML = '<div class="empty-state"><p>Connection error.</p></div>';
        }
    }

    function renderList(emails) {
        const listEl = document.getElementById('email-list');
        document.getElementById('list-count').textContent = emails.length ? `${emails.length} message${emails.length !== 1 ? 's' : ''}` : '';

        if (!emails.length) {
            const icons = {
                inbox: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
                sent:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
                trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
            };
            listEl.innerHTML = `<div class="empty-state">${icons[currentFolder] || ''}<p>Nothing here yet.</p></div>`;
            return;
        }

        listEl.innerHTML = emails.map(e => {
            const isUnread = currentFolder === 'inbox' && !e.read;
            const displayName = currentFolder === 'sent' ? (e.to || '') : (e.from || '');
            const label = currentFolder === 'sent' ? `To: ${displayName}` : displayName;
            const dateStr = formatDate(e.date);
            return `
                <div class="email-item ${isUnread ? 'unread' : ''}" id="ei-${e.id}"
                     onclick="openEmail(${e.id})">
                    <div class="email-from">${escHtml(label)}</div>
                    <div class="email-subject">${escHtml(e.subject)}</div>
                    <div class="email-date">${dateStr}</div>
                    <div class="unread-dot"></div>
                </div>`;
        }).join('');
    }

    // ── Open email ─────────────────────────────────────────────────────────────
    async function openEmail(id) {
        currentEmailId = id;

        document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
        const item = document.getElementById('ei-' + id);
        if (item) { item.classList.add('active'); item.classList.remove('unread'); item.querySelector('.unread-dot').style.display = 'none'; }

        document.getElementById('read-placeholder').style.display = 'none';
        document.getElementById('email-view').classList.add('visible');
        document.getElementById('email-view-header').innerHTML = '<p style="color:var(--muted);font-size:.85rem">Loading…</p>';
        document.getElementById('email-view-body').textContent = '';

        try {
            const res  = await fetch('/api/hkmail/email/' + id);
            const data = await res.json();
            if (!data.success) { document.getElementById('email-view-header').innerHTML = '<p style="color:red">Error loading email.</p>'; return; }

            const e = data.email;
            renderEmailView(e);
            refreshUnread();
        } catch {
            document.getElementById('email-view-header').innerHTML = '<p style="color:red">Connection error.</p>';
        }
    }

    function renderEmailView(e) {
        const isInbox = currentFolder === 'inbox';
        const isSent  = currentFolder === 'sent';
        const isTrash = currentFolder === 'trash';

        let actions = '';

        if (!isTrash) {
            if (isInbox) {
                actions += `<button class="action-btn" onclick="replyTo('${escHtml(e.from)}','${escHtml(e.subject)}')">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
                    Reply
                </button>`;
                actions += `<button class="action-btn" onclick="toggleRead(${e.id}, ${e.read ? 0 : 1})">
                    ${e.read ? 'Mark unread' : 'Mark read'}
                </button>`;
            }
            actions += `<button class="action-btn danger" onclick="deleteEmail(${e.id})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                Move to Trash
            </button>`;
        } else {
            actions += `<button class="action-btn success" onclick="restoreEmail(${e.id})">Restore</button>`;
            actions += `<button class="action-btn danger" onclick="permanentDelete(${e.id})">Delete permanently</button>`;
        }

        document.getElementById('email-view-header').innerHTML = `
            <div class="email-view-subject">${escHtml(e.subject)}</div>
            <div class="email-view-meta">
                <span><strong>From:</strong> ${escHtml(e.from)}</span>
                <span><strong>To:</strong> ${escHtml(e.to)}</span>
                <span><strong>Date:</strong> ${formatDate(e.date, true)}</span>
            </div>
            <div class="email-view-actions">${actions}</div>
        `;
        document.getElementById('email-view-body').textContent = e.body;
    }

    function hideEmailView() {
        document.getElementById('read-placeholder').style.display = '';
        document.getElementById('email-view').classList.remove('visible');
    }

    // ── Reply ──────────────────────────────────────────────────────────────────
    function replyTo(from, subject) {
        document.getElementById('c-to').value = from;
        document.getElementById('c-subject').value = subject.startsWith('Re:') ? subject : 'Re: ' + subject;
        document.getElementById('c-body').value = '';
        openCompose();
    }

    // ── Actions ────────────────────────────────────────────────────────────────
    async function toggleRead(id, readVal) {
        await fetch('/api/hkmail/email/' + id + '/mark-read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ read: !!readVal })
        });
        await loadFolder(currentFolder);
        refreshUnread();
    }

    async function deleteEmail(id) {
        const res  = await fetch('/api/hkmail/email/' + id + '/delete', { method: 'POST' });
        const data = await res.json();
        showToast(data.message || 'Moved to Trash.');
        await loadFolder(currentFolder);
        refreshUnread();
    }

    async function restoreEmail(id) {
        const res  = await fetch('/api/hkmail/email/' + id + '/restore', { method: 'POST' });
        const data = await res.json();
        showToast(data.message || 'Restored.');
        await loadFolder('trash');
    }

    async function permanentDelete(id) {
        if (!confirm('Permanently delete this email? This cannot be undone.')) return;
        const res  = await fetch('/api/hkmail/email/' + id + '/delete-permanent', { method: 'POST' });
        const data = await res.json();
        showToast(data.message || 'Deleted.');
        await loadFolder('trash');
    }

    // ── Unread badge ───────────────────────────────────────────────────────────
    async function refreshUnread() {
        try {
            const res  = await fetch('/api/hkmail/unread-count');
            const data = await res.json();
            const badge = document.getElementById('unread-badge');
            if (data.count > 0) {
                badge.textContent = data.count;
                badge.classList.add('visible');
            } else {
                badge.classList.remove('visible');
            }
        } catch {}
    }

    // ── Compose ────────────────────────────────────────────────────────────────
    function openCompose() {
        clearComposeMsg();
        document.getElementById('compose-modal').classList.add('open');
        document.getElementById('c-to').focus();
    }

    function closeCompose() {
        document.getElementById('compose-modal').classList.remove('open');
    }

    function clearComposeMsg() {
        const el = document.getElementById('compose-msg');
        el.className = 'compose-msg';
        el.textContent = '';
    }

    function showComposeMsg(text, type) {
        const el = document.getElementById('compose-msg');
        el.textContent = text;
        el.className = 'compose-msg ' + type;
    }

    async function doSend() {
        const to      = document.getElementById('c-to').value.trim();
        const subject = document.getElementById('c-subject').value.trim();
        const body    = document.getElementById('c-body').value.trim();
        const btn     = document.getElementById('send-btn');

        if (!to)   { showComposeMsg('Please enter a recipient.', 'error'); return; }
        if (!body) { showComposeMsg('Please write a message.', 'error'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Sending…';
        clearComposeMsg();

        try {
            const res  = await fetch('/api/hkmail/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ recipient: to, subject, body })
            });
            const data = await res.json();

            if (data.success) {
                showComposeMsg(data.message, 'success');
                document.getElementById('c-to').value = '';
                document.getElementById('c-subject').value = '';
                document.getElementById('c-body').value = '';
                setTimeout(() => {
                    closeCompose();
                    if (currentFolder === 'sent') loadFolder('sent');
                    showToast('Message sent!');
                }, 1200);
            } else {
                showComposeMsg(data.message || 'Failed to send.', 'error');
            }
        } catch {
            showComposeMsg('Connection error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send';
        }
    }

    // ── Logout ─────────────────────────────────────────────────────────────────
    async function doLogout() {
        await fetch('/api/hkmail/logout', { method: 'POST' });
        window.location.href = '/hkmail.html';
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function escHtml(str) {
        return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr, full = false) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        if (full) return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
        const now  = new Date();
        const diff = now - d;
        if (diff < 60000)  return 'Just now';
        if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
        if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Close compose on overlay click
    document.getElementById('compose-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('compose-modal')) closeCompose();
    });

    // Auto-refresh inbox every 30s
    setInterval(() => {
        if (currentFolder === 'inbox') loadFolder('inbox');
        refreshUnread();
    }, 30000);
</script>

</body>
</html>
