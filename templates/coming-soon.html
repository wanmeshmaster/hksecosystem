<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - HKS Ecosystem</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: #333; 
            padding: 20px;
            background-image: url('/source/main_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }
        
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
            max-width: 500px; 
            width: 100%; 
            text-align: center; 
            backdrop-filter: blur(4px);
        }
        
        h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 2rem; }
        p.subtitle { color: #64748b; margin-bottom: 30px; font-size: 1rem; line-height: 1.5; }
        
        /* Progress Bar Styling */
        .progress-container { width: 100%; background-color: #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 10px; height: 24px; position: relative; }
        .progress-bar { height: 100%; background-color: #10b981; width: 0%; transition: width 0.5s ease-in-out; }
        .progress-text { margin-bottom: 25px; font-size: 0.95rem; font-weight: 600; color: #333; }
        
        /* Buttons & Links */
        .contribute-btn { 
            background-color: #0052cc; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0, 82, 204, 0.2);
        }
        .contribute-btn:hover { 
            background-color: #003d99; 
            transform: translateY(-1px);
        }
        .contribute-btn:disabled { 
            background-color: #94a3b8; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
        .back-link:hover { color: #0052cc; }

        /* Toast Notification Styling */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 300;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Under Construction</h1>
        <p class="subtitle">We are currently building this application. You can help speed up development by contributing to our goal!</p>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">$0 / $1,000 Raised</div>

        <button id="contribute-btn" class="contribute-btn" onclick="initiateCheckout()">Contribute $5</button>
        
        <br>
        <a href="/" class="back-link">&larr; Back to Ecosystem</a>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // 1. Load the progress bar on page load
        async function loadProgress() {
            try {
                const response = await fetch('/api/contribution-status');
                const data = await response.json();
                
                if (data.success) {
                    const goal = data.goal || 1000;
                    const percentage = Math.min((data.total / goal) * 100, 100);
                    document.getElementById('progress-bar').style.width = percentage + '%';
                    document.getElementById('progress-text').innerText = `$${data.total.toFixed(2)} / $${goal.toFixed(2)} Raised`;
                }
            } catch (err) {
                console.error("Failed to load progress:", err);
            }
        }

        // 2. Start the checkout process directly via HKS Bank Checkout
        function initiateCheckout() {
            const btn = document.getElementById('contribute-btn');
            btn.disabled = true;
            btn.innerText = "Connecting to HKS Bank...";

            const checkoutUrl = "/hks-bank-checkout.html?amount=5&desc=HKS+Coming+Soon+Contribution&return_url=/coming-soon.html?contributed=1";
            window.location.href = checkoutUrl;
        }

        // 3. Toast notification logic
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 4. Initialize page and handle successful returns
        window.addEventListener('load', () => {
            loadProgress();

            // Check if returning from a successful HKS Bank checkout
            const params = new URLSearchParams(window.location.search);
            if (params.get('contributed') === '1') {
                showToast('Thank you for your contribution!');
                window.history.replaceState({}, '', '/coming-soon.html');
            }
        });
    </script>
</body>
</html>
